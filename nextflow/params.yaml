# nf-core/rnaseq — paramètres par run
# Adapter les valeurs avant chaque lancement.
# Référence : https://nf-co.re/rnaseq/parameters

# ── Données d'entrée ──────────────────────────────────────────────────────────
# Samplesheet CSV au format nf-core :
# sample,fastq_1,fastq_2,strandedness
# S001,s3://nf-kapsule-input/S001_R1.fastq.gz,s3://nf-kapsule-input/S001_R2.fastq.gz,auto
# SRR1039508 : human airway smooth muscle cells (Himes et al. 2014, Bioconductor airway)
# 50K reads PE 63 bp, TruSeq RNA non-stranded, aligne sur GRCh38.
# Remplace SRR6357070 (nf-core test-datasets = levure synthétique, taxid|4932, n'aligne pas sur GRCh38).
input: "s3://nf-kapsule-input/samplesheet.csv"

# ── Génome de référence ───────────────────────────────────────────────────────
# Option A : laisser nf-core télécharger et indexer (~4-6h supplémentaires par run)
# genome: "GRCh38"

# Option A : nf-core génère l'index via STAR_GENOMEGENERATE (version STAR cohérente)
# L'index est écrit dans le workdir SFS et mis en cache par Nextflow (-resume).
# STAR_ALIGN_IGENOMES (container STAR 2.6.1d) est appelé uniquement quand star_index
# est fourni ici — incompatible avec un index construit par STAR 2.7.x.
gtf: "/data/reference/gtf/genes.gtf"
fasta: "/data/reference/fasta/genome.fa"

# Option B : index STAR pré-généré — NE FOURNIR QUE L'INDEX CONSTRUIT PAR nf-core.
# Le chemin ci-dessous est spécifique au workdir SFS d'un cluster donné.
# Sur un nouveau cluster : laisser commenté → nf-core génère l'index automatiquement
# via STAR_GENOMEGENERATE_IGENOMES (même container STAR 2.6.1d → compatible).
# Une fois l'index généré, retrouver son chemin dans le workdir SFS et le définir ici
# pour les runs suivants (évite de régénérer ~1-2h à chaque fois).
# NE PAS utiliser l'index bootstrap de make upload-reference (STAR 2.7.10b → exit 102).
# star_index: "/data/workdir/<hash>/star"   # à renseigner après le premier run

# ── Répertoire de sortie ──────────────────────────────────────────────────────
# Adapter la date/identifiant à chaque run. run-pipeline.sh génère un outdir
# dynamique (s3://nf-kapsule-results/run-DATE) qui écrase cette valeur.
outdir: "s3://nf-kapsule-results/run-DATE"

# ── Paramètres séquençage ─────────────────────────────────────────────────────
# Illumina NovaSeq 6000 S4 — bulk RNA-seq, read_length=150 bp
# Note : read_length et strandedness ne sont plus des params top-level valides
# en nf-core/rnaseq v3.14.0 (ils sont par sample dans la samplesheet).
# Les laisser ici génère des WARNs non-bloquants — retirés pour nettoyer les logs.

# ── Aligneur ──────────────────────────────────────────────────────────────────
aligner: "star_salmon"   # STAR pour l'alignement + Salmon pour la quantification
# Sur de vrais FASTQs NovaSeq (millions de reads), le seuil par défaut de 10
# fragments assignés est toujours atteint. Pour le dataset test SRR6357070
# (2 MB, ~20k reads), le BAM transcriptome est trop sparse → forcer à 1.
extra_salmon_quant_args: "--minAssignedFrags 1"
# pseudo_aligner désactivé : avec aligner=star_salmon, salmon quant tourne déjà
# sur les BAM STAR. Le pathway QUANTIFY_PSEUDO_ALIGNMENT (salmon sur reads bruts)
# échoue sur les petits datasets (< 10 fragments assignés → exit 1).
# Sur de vrais FASTQs NovaSeq, réactiver si tu veux une quantification indépendante.

# ── Limites ressources ────────────────────────────────────────────────────────
# max_cpus / max_memory définis dans nextflow.config (params block).
# Ne PAS les surcharger ici : params.yaml écrase nextflow.config et les labels
# nf-core (process_high = 12 CPU) seraient cappés à max_cpus au lieu d'être
# écrasés par withName:'.*' {cpus=2}, ce qui bloquerait les pods sur l'orchestrateur.
max_time: "8.h"

# ── Optimisations ─────────────────────────────────────────────────────────────
save_align_intermeds: false   # Ne pas sauvegarder les BAM intermédiaires
save_unaligned: false          # Ne pas garder les reads non alignés
skip_markduplicates: false
skip_qc: false

# ── Contrôle qualité ──────────────────────────────────────────────────────────
min_mapped_reads: 5
