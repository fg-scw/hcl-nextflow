# nf-core/rnaseq — paramètres par run
# Adapter les valeurs avant chaque lancement.
# Référence : https://nf-co.re/rnaseq/parameters

# ── Données d'entrée ──────────────────────────────────────────────────────────
# Samplesheet CSV au format nf-core :
# sample,fastq_1,fastq_2,strandedness
# S001,s3://nf-kapsule-input/S001_R1.fastq.gz,s3://nf-kapsule-input/S001_R2.fastq.gz,auto
input: "s3://nf-kapsule-input/run-20260701/samplesheet.csv"

# ── Génome de référence ───────────────────────────────────────────────────────
# Option A : laisser nf-core télécharger et indexer (~4-6h supplémentaires par run)
# genome: "GRCh38"

# Option B : index STAR pré-généré via make upload-reference (recommandé)
# Index actif : GRCh38 Ensembl 110, sjdbOverhang=149 (read_length=150)
star_index: "/data/reference/star_index/GRCh38_150bp"
gtf: "/data/reference/gtf/genes.gtf"
fasta: "/data/reference/fasta/genome.fa"

# ── Répertoire de sortie ──────────────────────────────────────────────────────
outdir: "s3://nf-kapsule-results/run-20260701"

# ── Paramètres séquençage ─────────────────────────────────────────────────────
# Illumina NovaSeq 6000 S4 — bulk RNA-seq, read_length=150 bp
# Note : read_length et strandedness ne sont plus des params top-level valides
# en nf-core/rnaseq v3.14.0 (ils sont par sample dans la samplesheet).
# Les laisser ici génère des WARNs non-bloquants — retirés pour nettoyer les logs.

# ── Aligneur ──────────────────────────────────────────────────────────────────
aligner: "star_salmon"   # STAR pour l'alignement + Salmon pour la quantification
pseudo_aligner: "salmon"

# ── Limites ressources ────────────────────────────────────────────────────────
# max_cpus / max_memory définis dans nextflow.config (params block).
# Ne PAS les surcharger ici : params.yaml écrase nextflow.config et les labels
# nf-core (process_high = 12 CPU) seraient cappés à max_cpus au lieu d'être
# écrasés par withName:'.*' {cpus=2}, ce qui bloquerait les pods sur l'orchestrateur.
max_time: "8.h"

# ── Optimisations ─────────────────────────────────────────────────────────────
save_align_intermeds: false   # Ne pas sauvegarder les BAM intermédiaires
save_unaligned: false          # Ne pas garder les reads non alignés
skip_markduplicates: false
skip_qc: false

# ── Contrôle qualité ──────────────────────────────────────────────────────────
min_mapped_reads: 5
